<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Street Sole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
        }
        header {
            background-color: #1e1e1e;
            padding: 1rem 2rem;
            text-align: center;
            border-bottom: 2px solid #CCFF00;
        }
        header h1 {
            color: #CCFF00;
            text-shadow: 0 0 10px #CCFF00;
            font-size: 2.5rem;
        }
        .checkout {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #CCFF00;
            text-shadow: 0 0 5px #CCFF00;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 1rem;
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #CCFF00;
            box-shadow: 0 0 10px rgba(204, 255, 0, 0.5);
        }
        .pay-btn {
            width: 100%;
            background-color: #CCFF00;
            color: #000;
            border: none;
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: none;
            transition: all 0.3s;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 1rem;
        }
        .pay-btn:hover {
            box-shadow: 0 0 30px #CCFF00;
            transform: scale(1.02);
        }
        @media (max-width: 768px) {
            .checkout { padding: 1rem; margin: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Street Sole</h1>
    </header>
    <section class="checkout">
        <h2 style="text-align: center; color: #CCFF00; text-shadow: 0 0 10px #CCFF00; margin-bottom: 2rem;">Finalizar Compra</h2>
        <form>
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" required>
            </div>
            <div class="form-group">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" required>
            </div>
            <div class="form-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" required>
            </div>
            <div class="form-group">
                <label for="cep">CEP</label>
                <input type="text" id="cep" required>
            </div>
            <div class="form-group">
                <label for="pais">País</label>
                <input type="text" id="pais" required>
            </div>
        </form>
        <a href="https://buy.stripe.com/fZu28t0PX2kYbgsf9neIw0i" class="pay-btn">Pagar com Stripe</a>
    </section>
</body>
</html>
