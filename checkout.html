<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Street Sole</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #0f0f0f 0%, #2a2a2a 50%, #1a1a1a 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .checkout-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .product-summary {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .product-summary img {
            width: 220px;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .product-summary h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #333;
        }
        .shipping-form {
            display: grid;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        .shipping-form label {
            font-weight: 500;
            color: #555;
            font-size: 0.95rem;
        }
        .shipping-form input,
        .shipping-form select {
            padding: 1rem 1.2rem;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .shipping-form input:focus,
        .shipping-form select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .pay-button {
            display: block;
            width: 100%;
            padding: 1.3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .pay-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .checkout-container {
                padding: 1.5rem;
                margin: 0 10px;
            }
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Street Sole</h1>
    </header>
    <div class="checkout-container" id="checkout">
        <div class="product-summary">
            <img id="product-img" src="" alt="Produto">
            <h2 id="product-name">Carregando...</h2>
        </div>
        <form class="shipping-form">
            <div>
                <label for="name">Nome Completo</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="phone">Telefone</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div>
                <label for="address">Endereço</label>
                <input type="text" id="address" name="address" required>
            </div>
            <div>
                <label for="city">Cidade</label>
                <input type="text" id="city" name="city" required>
            </div>
            <div>
                <label for="zip">CEP</label>
                <input type="text" id="zip" name="zip" required>
            </div>
            <div>
                <label for="country">País</label>
                <select id="country" name="country" required>
                    <option value="">Selecione...</option>
                    <option value="BR">Brasil</option>
                    <option value="US">United States</option>
                    <option value="CA">Canada</option>
                    <option value="GB">United Kingdom</option>
                    <option value="DE">Germany</option>
                    <option value="FR">France</option>
                    <option value="IT">Italy</option>
                    <option value="ES">Spain</option>
                    <option value="MX">Mexico</option>
                    <option value="AR">Argentina</option>
                </select>
            </div>
        </form>
        <a id="stripe-button" class="pay-button" href="#" target="_blank">Pagar com Stripe</a>
    </div>
    <script>

            },
            'skechers-go-walk': {
                name: 'Skechers Go Walk',

            },
            'under-armour-hovr': {

            },
            'hoka-one-one-carbon-x': {

            },
            'on-cloud-5': {

                stripe: 'https://buy.stripe.com/5kE5mMtest18'
            }
        };

        const checkout = document.getElementById('checkout');
        const productImg = document.getElementById('product-img');
        const productName = document.getElementById('product-name');
        const stripeButton = document.getElementById('stripe-button');

        if (sku && products[sku]) {
            const product = products[sku];
            productImg.src = product.img;
            productImg.alt = product.name;
            productName.textContent = product.name;
            stripeButton.href = product.stripe;
        } else {
            checkout.innerHTML = '<div class="error">Produto não encontrado. Verifique o SKU na URL.</div>';
        }
    </script>
</body>
</html>
