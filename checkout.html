<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Street Sole</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .back-link {
            position: absolute;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-link:hover {
            color: #667eea;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(220,38,38,0.1);
            margin-bottom: 2rem;
            display: none;
        }
        .error a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .checkout-section {
            display: grid;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
        }
        .product-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 2rem;
            align-items: start;
        }
        .product-image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .product-details h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }
        .product-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 1.1rem;
            color: #666;
        }
        .product-price {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
            margin-top: 1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 500;
            color: #333;
            font-size: 1rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .pay-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1.5rem;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pay-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(102,126,234,0.5);
        }
        .pay-button:active {
            transform: translateY(-1px);
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            .back-link {
                left: 1rem;
                font-size: 1rem;
            }
            .product-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .product-image {
                width: 100%;
                max-width: 250px;
                height: 250px;
                margin: 0 auto;
            }
            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="back-link">← Back to Shop</a>
        <h1>Street Sole</h1>
        <p>Secure Checkout</p>
    </header>

    <div class="container">
        <div id="error" class="error"></div>

        <div id="checkout-content">
            <div class="checkout-section">
                <div id="product-summary" class="card">
                    <div class="product-grid">
                        <img id="prod-image" class="product-image" alt="Product">
                        <div class="product-details">
                            <h2 id="prod-name"></h2>
                            <div class="product-meta">
                                <div id="prod-sku"></div>
                                <div id="prod-size"></div>
                            </div>
                            <div id="prod-price" class="product-price"></div>
                        </div>
                    </div>
                </div>

                <form id="shipping-form" class="card">
                    <h3 style="font-size:1.5rem; font-weight:600; margin-bottom:1.5rem; color:#1a1a1a;">Shipping Details</h3>
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="address">Address *</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City *</label>
                        <input type="text" id="city" name="city" required>
                    </div>
                    <div class="form-group">
                        <label for="postalCode">Postal Code *</label>
                        <input type="text" id="postalCode" name="postalCode" required>
                    </div>
                    <div class="form-group">
                        <label for="country">Country *</label>
                        <select id="country" name="country" required>
                            <option value="">Select Country</option>
                            <option value="Portugal">Portugal</option>
                            <option value="UK">UK</option>
                            <option value="Germany">Germany</option>
                            <option value="France">France</option>
                            <option value="Italy">Italy</option>
                            <option value="Spain">Spain</option>
                        </select>
                    </div>
                </form>

                <button id="pay-btn" class="pay-button">Pay Securely with Stripe</button>
            </div>
        </div>
    </div>

            },
            'H03472': {
                name: 'Adidas Campus 00s',
                price: '€60,00',
                size: '39',
                stripe: 'https://buy.stripe.com/fZu28t0PX2kYbgsf9neIw0i',
                image: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871575/WhatsApp_Image_2026-04-18_at_19.19.56_e4hdnp.jpg'
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sku = urlParams.get('sku');
            const productSummary = document.getElementById('product-summary');
            const shippingForm = document.getElementById('shipping-form');
            const payBtn = document.getElementById('pay-btn');
            const errorEl = document.getElementById('error');
            const checkoutContent = document.getElementById('checkout-content');

            // Load saved form data
            const savedData = localStorage.getItem('checkoutData');
            if (savedData) {
                const data = JSON.parse(savedData);
                Object.keys(data).forEach(key => {
                    const el = document.getElementById(key);
                    if (el) el.value = data[key];
                });
            }

            if (!sku || !products[sku]) {
                checkoutContent.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.innerHTML = '<strong>Invalid or missing product SKU.</strong><br><a href="index.html">← Go back to shop</a>';
                return;
            }

            const product = products[sku];

            // Populate product details
            document.getElementById('prod-image').src = product.image;
            document.getElementById('prod-image').alt = product.name;
            document.getElementById('prod-name').textContent = product.name;
            document.getElementById('prod-sku').textContent = `SKU: ${sku}`;
            document.getElementById('prod-size').textContent = `Size: ${product.size}`;
            document.getElementById('prod-price').textContent = product.price;

            // Pay button handler
            payBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const formData = new FormData(shippingForm);
                const fullName = formData.get('fullName');
                const email = formData.get('email');
                const address = formData.get('address');
                const city = formData.get('city');
                const postalCode = formData.get('postalCode');
                const country = formData.get('country');

                if (!fullName || !email || !address || !city || !postalCode || !country) {
                    alert('Please fill in all required fields (*)');
                    return;
                }

                // Save form data
                localStorage.setItem('checkoutData', JSON.stringify(Object.fromEntries(formData)));

                // Redirect to Stripe
                window.location.href = product.stripe;
            });
        });
    </script>

</html>
