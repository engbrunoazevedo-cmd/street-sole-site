    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            line-height: 1.6;
        }
        header {
            background: #222;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        #products-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        .product-card h3 {
            padding: 1.2rem;
            font-size: 1.3em;
            color: #333;
            text-align: center;
        }
        .image-carousel {
            position: relative;
            height: 260px;
            overflow: hidden;
        }
        .slides {
            position: relative;
            height: 100%;
        }
        .slides img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .prev,
        .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 12px 16px;
            font-size: 1.6em;
            cursor: pointer;
            z-index: 20;
            border-radius: 4px;
            transition: background 0.3s;
            user-select: none;
        }
        .prev:hover,
        .next:hover {
            background: rgba(0,0,0,0.9);
        }
        .prev {
            left: 12px;
        }
        .next {
            right: 12px;
        }
        .dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot {
            height: 14px;
            width: 14px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot.active {
            background: #007cba;
            transform: scale(1.1);
        }
        .price {
            padding: 0 1.2rem 1.5rem;
            font-size: 1.6em;
            font-weight: bold;
            color: #007cba;
            text-align: center;
        }
        .buy-now {
            display: block;
            background: linear-gradient(135deg, #007cba, #005a87);
            color: white;
            text-align: center;
            padding: 1.2rem;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s;
            border-radius: 0 0 12px 12px;
        }
        .buy-now:hover {
            background: linear-gradient(135deg, #005a87, #003d5b);
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            #products-container {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.5rem;
                padding: 1rem;
            }
        }
    </style>

        let slideIndexes = {};

        function showSlides(n, slideIndex) {
            const carousel = document.querySelector(`[data-carousel=\"${n}\"]`);
            if (!carousel) return;
            const slides = carousel.querySelectorAll('.slides img');
            const dots = carousel.querySelectorAll('.dot');
            slides.forEach((slide, i) => {
                slide.style.display = i === slideIndex ? 'block' : 'none';
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === slideIndex);
            });
            slideIndexes[n] = slideIndex;
        }

        function changeSlide(n, direction) {
            let slideIndex = slideIndexes[n] || 0;
            const numSlides = products[n].images.length;
            slideIndex = (slideIndex + direction + numSlides) % numSlides;
            showSlides(n, slideIndex);
        }

        function currentSlide(n, slideIndex) {
            showSlides(n, slideIndex);
        }

        function generateProducts() {
            const container = document.getElementById('products-container');
            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${product.name.replace(/'/g, "&apos;")}</h3>
                    <div class="image-carousel" data-carousel="${index}">
                        <div class="slides">
                            ${product.images.map((imgSrc, i) => `<img src="${imgSrc}" alt="${product.name} ${i+1}">`).join('')}
                        </div>
                        <button class="prev" type="button" onclick="changeSlide(${index}, -1)">❮</button>
                        <button class="next" type="button" onclick="changeSlide(${index}, 1)">❯</button>
                        <div class="dots">
                            ${product.images.map((_, i) => `<span class="dot" onclick="currentSlide(${index}, ${i})"></span>`).join('')}
                        </div>
                    </div>
                    <p class="price">${product.price}</p>
                    <a href="checkout.html?sku=${product.sku}" class="buy-now">Buy Now</a>
                `;
                container.appendChild(card);
            });
            products.forEach((_, index) => showSlides(index, 0));
        }
