  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: linear-gradient(135deg, #000000 0%, #333333 100%);
      color: white;
      text-align: center;
      padding: 2rem;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      border-radius: 12px;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .carousel {
      position: relative;
      height: 250px;
    }
    .carousel-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .slide.active {
      display: block;
    }
    .prev,
    .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 1.5rem;
      padding: 0;
      cursor: pointer;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      z-index: 10;
    }
    .prev:hover,
    .next:hover {
      background: rgba(0,0,0,0.8);
    }
    .prev {
      left: 10px;
    }
    .next {
      right: 10px;
    }
    .dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.3s;
    }
    .dot.active,
    .dot:hover {
      background: white;
    }
    .card-content {
      padding: 1.5rem;
    }
    .card-content h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .code {
      color: #666;
      font-size: 0.9rem;
      margin: 0 0 0.5rem 0;
    }
    .price {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
    }
    .size {
      color: #888;
      margin: 0 0 1rem 0;
    }
    .buy-now {
      display: block;
      background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
      color: white;
      text-decoration: none;
      padding: 1rem;
      text-align: center;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.3s;
    }
    .buy-now:hover {
      transform: scale(1.02);
    }
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }
      header {
        font-size: 2rem;
        padding: 1.5rem;
      }
    }
  </style>
</head>

    function generateCards() {
      const grid = document.querySelector('.products');
      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="carousel">
            <div class="carousel-container">
              ${product.images.map((src, i) => `
                <img src="${src}" alt="${product.name} - View ${i + 1}" class="slide ${i === 0 ? 'active' : ''}">
              `).join('')}
            </div>
            <button class="prev">&#8249;</button>
            <button class="next">&#8250;</button>
            <div class="dots">
              ${product.images.map((_, i) => `
                <span class="dot ${i === 0 ? 'active' : ''}" data-slide="${i}"></span>
              `).join('')}
            </div>
          </div>
          <div class="card-content">
            <h3>${product.name}</h3>
            <p class="code">${product.sku}</p>
            <p class="price">${product.price}</p>
            <p class="size">${product.size}</p>
            <a href="#" class="buy-now">Buy Now</a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function showSlide(carousel, index) {
      const slides = carousel.querySelectorAll('.slide');
      const dots = carousel.querySelectorAll('.dot');
      slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    function nextSlide(carousel) {
      const activeSlide = carousel.querySelector('.slide.active');
      const slides = carousel.querySelectorAll('.slide');
      let nextIdx = Array.from(slides).indexOf(activeSlide) + 1;
      if (nextIdx >= slides.length) nextIdx = 0;
      showSlide(carousel, nextIdx);
    }

    function prevSlide(carousel) {
      const activeSlide = carousel.querySelector('.slide.active');
      const slides = carousel.querySelectorAll('.slide');
      let prevIdx = Array.from(slides).indexOf(activeSlide) - 1;
      if (prevIdx < 0) prevIdx = slides.length - 1;
      showSlide(carousel, prevIdx);
    }

    document.addEventListener('DOMContentLoaded', generateCards);

    document.addEventListener('click', (e) => {
      const carousel = e.target.closest('.carousel');
      if (!carousel) return;
      if (e.target.matches('.next')) {
        nextSlide(carousel);
      } else if (e.target.matches('.prev')) {
        prevSlide(carousel);
      } else if (e.target.matches('.dot')) {
        const index = parseInt(e.target.dataset.slide);
        showSlide(carousel, index);
      }
    });
