<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Produtos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #f8f8f8;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .banner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        .logo-placeholder {
            width: 120px;
            height: 60px;
            display: inline-block;
            background: #ddd;
            margin-right: 20px;
            cursor: pointer;
            border: 2px dashed #999;
            text-align: center;
            line-height: 60px;
            font-size: 12px;
            color: #666;
        }
        .banner h1 {
            margin: 0;
            color: #333;
        }
        .products {
            max-width: 1200px;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 0 20px;
        }
        .product {
            width: 300px;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .sku {
            display: block;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .carousel {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            height: 200px;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
            margin-bottom: 10px;
        }
        .carousel img {
            width: 90px;
            height: 200px;
            flex-shrink: 0;
            object-fit: cover;
            border-radius: 4px;
            scroll-snap-align: start;
        }
        .product h3 {
            margin: 0 0 10px 0;
        }
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: #25d366;
            color: #fff;
            border-radius: 50%;
            text-align: center;
            font-size: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: background 0.3s;
        }
        .whatsapp-float:hover {
            background-color: #128c7e;
            transform: scale(1.05);
        }
        footer {
            background: #f0f0f0;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div class="banner">
            <a class="logo-placeholder" href="#" title="Espaço para Logo da Empresa - Clique para editar link">LOGO</a>
            <h1>Banner Superior da Loja</h1>
        </div>
    </header>

    <section class="products">
        <div class="product">
            <h3>Nome do Produto 1</h3>
            <span class="sku">Código: PROD001</span>
            <div class="carousel">
                <img src="https://via.placeholder.com/300x200/ff6b6b/ffffff?text=1" alt="Imagem 1 do Produto 1">
                <img src="https://via.placeholder.com/300x200/4ecdc4/ffffff?text=2" alt="Imagem 2 do Produto 1">
                <img src="https://via.placeholder.com/300x200/45b7d1/ffffff?text=3" alt="Imagem 3 do Produto 1">
            </div>
            <p>Descrição do produto 1 mantida idêntica.</p>
        </div>

        <div class="product">
            <h3>Nome do Produto 2</h3>
            <span class="sku">Código: PROD002</span>
            <div class="carousel">
                <img src="https://via.placeholder.com/300x200/96ceb4/ffffff?text=1" alt="Imagem 1 do Produto 2">
                <img src="https://via.placeholder.com/300x200/feca57/ffffff?text=2" alt="Imagem 2 do Produto 2">
                <img src="https://via.placeholder.com/300x200/ff9ff3/ffffff?text=3" alt="Imagem 3 do Produto 2">
            </div>
            <p>Descrição do produto 2 mantida idêntica.</p>
        </div>

        <div class="product">
            <h3>Nome do Produto 3</h3>
            <span class="sku">Código: PROD003</span>
            <div class="carousel">
                <img src="https://via.placeholder.com/300x200/54a0ff/ffffff?text=1" alt="Imagem 1 do Produto 3">
                <img src="https://via.placeholder.com/300x200/5f27cd/ffffff?text=2" alt="Imagem 2 do Produto 3">
                <img src="https://via.placeholder.com/300x200/00d2d3/ffffff?text=3" alt="Imagem 3 do Produto 3">
            </div>
            <p>Descrição do produto 3 mantida idêntica.</p>
        </div>
    </section>

    <a href="https://wa.me/351925659411?text=Ol%C3%A1,%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es!" class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        💬
    </a>

    <footer>
        <p>Rodapé da loja.</p>
    </footer>
</body>
</html>
