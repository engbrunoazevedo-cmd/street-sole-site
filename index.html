    header {
      background: linear-gradient(135deg, #000000 0%, #333333 100%);
      color: white;
      text-align: center;
      padding: 2rem;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      border-radius: 12px;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .carousel {
      position: relative;
      height: 250px;
    }
    .carousel-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .slide.active {
      display: block;
    }
    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 1.5rem;
      padding: 0;
      cursor: pointer;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      z-index: 10;
    }
    .prev:hover, .next:hover {
      background: rgba(0,0,0,0.8);
    }
    .prev { left: 10px; }
    .next { right: 10px; }
    .dots {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.3s;
    }
    .dot.active, .dot:hover {
      background: white;
    }
    .card-content {
      padding: 1.5rem;
    }
    .card-content h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .code {
      color: #666;
      font-size: 0.9rem;
      margin: 0 0 0.5rem 0;
    }
    .price {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #e74c3c;
    }
    .size {
      color: #888;
      margin: 0 0 1rem 0;
    }
    .buy-now {
      display: block;
      background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
      color: white;
      text-decoration: none;
      padding: 1rem;
      text-align: center;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.3s;
    }
    .buy-now:hover {
      transform: scale(1.02);
    }
    footer {
      background: linear-gradient(135deg, #000000 0%, #333333 100%);
      padding: 2rem;
      text-align: center;
      margin-top: 2rem;
      border-radius: 12px;
    }
    footer p {
      color: white;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }
    .contact-icons {
      display: flex;
      justify-content: center;
      gap: 2rem;
    }
    .contact-icons a {
      font-size: 2.5rem;
      transition: transform 0.3s;
    }
    .contact-icons a:hover {
      transform: scale(1.1);
    }
    .whatsapp { color: #25D366; }
    .email { color: #EA4335; }
    @media (max-width: 768px) {
      header { font-size: 2rem; padding: 1.5rem; }
      .products { padding: 0 1rem 1rem; }
    }
  </style>

        let slideIndexes = {};

        function showSlides(n, slideIndex) {
            const carousel = document.querySelector(`[data-carousel=\"${n}\"]`);
            if (!carousel) return;
            const slides = carousel.querySelectorAll('.slides img');
            const dots = carousel.querySelectorAll('.dot');
            slides.forEach((slide, i) => {
                slide.style.display = i === slideIndex ? 'block' : 'none';
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === slideIndex);
            });
            slideIndexes[n] = slideIndex;
        }

        function changeSlide(n, direction) {
            let slideIndex = slideIndexes[n] || 0;
            const numSlides = products[n].images.length;
            slideIndex = (slideIndex + direction + numSlides) % numSlides;
            showSlides(n, slideIndex);
        }

        function currentSlide(n, slideIndex) {
            showSlides(n, slideIndex);
        }

        function generateProducts() {
            const container = document.getElementById('products-container');
            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${product.name.replace(/'/g, "&apos;")}</h3>
                    <div class="image-carousel" data-carousel="${index}">
                        <div class="slides">
                            ${product.images.map((imgSrc, i) => `<img src="${imgSrc}" alt="${product.name} ${i+1}">`).join('')}
                        </div>
                        <button class="prev" type="button" onclick="changeSlide(${index}, -1)">❮</button>
                        <button class="next" type="button" onclick="changeSlide(${index}, 1)">❯</button>
                        <div class="dots">
                            ${product.images.map((_, i) => `<span class="dot" onclick="currentSlide(${index}, ${i})"></span>`).join('')}
                        </div>
                    </div>
                    <p class="price">${product.price}</p>
                    <a href="checkout.html?sku=${product.sku}" class="buy-now">Buy Now</a>
                `;
                container.appendChild(card);
            });
            products.forEach((_, index) => showSlides(index, 0));
        }

        document.addEventListener('DOMContentLoaded', generateProducts);
