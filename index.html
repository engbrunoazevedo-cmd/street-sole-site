<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Sole</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            background: linear-gradient(to bottom, #000000, #1a1a1a);
            color: white;
            padding: 2rem;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 600;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        .carousel {
            position: relative;
            height: 250px;
            overflow: hidden;
        }
        .track {
            display: flex;
            height: 100%;
            transition: transform 0.4s ease;
        }
        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
        }
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: background 0.3s ease;
            z-index: 10;
        }
        .prev:hover, .next:hover {
            background: rgba(0, 0, 0, 0.8);
        }
        .prev {
            left: 10px;
        }
        .next {
            right: 10px;
        }
        .dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .dot.active {
            background: white;
        }
        .card-content {
            padding: 1.5rem;
        }
        .name {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 0.5rem;
            color: #333;
        }
        .price {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ff416c;
            margin: 0 0 0.5rem;
        }
        .size {
            color: #666;
            margin: 0 0 1rem;
            font-size: 0.95rem;
        }
        .buy {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: opacity 0.3s ease;
        }
        .buy:hover {
            opacity: 0.9;
        }
        @media (max-width: 768px) {
            header {
                font-size: 2rem;
                padding: 1.5rem;
            }
            .products {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                padding: 1rem;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Street Sole</h1>
    </header>
    <main class="products" id="products-grid">
        <!-- Products will be generated here -->
    </main>
    <script>
        const products = [

            {code: 'DH3855-400', name: 'Nike Air Force 1 Pixel Glacier', price: '€85,00', size: '40', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/fl_preserve_transparency/v1776868727/WhatsApp_Image_2026-04-17_at_12.55.50_oitykr.jpg?_s=public-apps'},
            {code: 'DC7294-103-40.5', name: 'Air Jordan 1 Mid SE Grey Pine Green', price: '€85,00', size: '40.5', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776870018/WhatsApp_Image_2026-04-18_at_18.54.01_1_fqczo5.jpg'},
            {code: 'DC7294-103', name: 'Air Jordan 1 Mid SE Grey Pine Green', price: '€85,00', size: '40', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776870018/WhatsApp_Image_2026-04-18_at_18.54.01_1_fqczo5.jpg'},
            {code: '554725-371', name: 'Air Jordan 1 Mid Sonics', price: '€90,00', size: '40', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776870183/WhatsApp_Image_2026-04-18_at_18.58.23_he7mdc.jpg'},
            {code: '554724-122', name: 'Air Jordan 1 Mid', price: '€90,00', size: '42', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871063/WhatsApp_Image_2026-04-18_at_19.00.26_1_a2h5r9.jpg'},
            {code: 'BQ6472-079', name: 'Air Jordan 1 Mid Gym Red Vermelho', price: '€90,00', size: '42', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776870955/WhatsApp_Image_2026-04-18_at_19.08.52_1_vgwgms.jpg'},
            {code: 'DC0500-100', name: 'Jordan 1 Mid Dia de los Muertos (GS)', price: '€100,00', size: '40', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871162/WhatsApp_Image_2026-04-17_at_12.58.42_2_h76djk.jpg'},
            {code: 'CZ0775-104', name: 'Air Jordan 1 Retro Low OG UNC', price: '€80,00', size: '41', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871211/WhatsApp_Image_2026-04-18_at_19.02.50_1_wh0urc.jpg'},
            {code: 'CZ0774-300', name: 'Air Jordan 1 Mid SE Dutch', price: '€120,00', size: '41', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871247/WhatsApp_Image_2026-04-18_at_19.06.55_ltsaw8.jpg'},

            {code: 'DO7413-991', name: 'Nike Dunk Low by Bernardo', price: '€90,00', size: '40', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871325/WhatsApp_Image_2026-04-18_at_19.05.09_1_ute63e.jpg'},
            {code: 'DD1503-118', name: 'Nike Dunk Low Rose Whisper', price: '€75,00', size: '39', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871362/WhatsApp_Image_2026-04-18_at_19.13.02_1_ayfvom.jpg'},
            {code: 'DD1503-116', name: 'Nike Dunk Low White Venice', price: '€90,00', size: '39', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871399/WhatsApp_Image_2026-04-18_at_19.15.00_1_oveznf.jpg'},
            {code: '555088-711', name: 'Air Jordan 1 Retro High OG Taxi Biqueira Amarela', price: '€115,00', size: '42', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871438/WhatsApp_Image_2026-04-18_at_19.16.42_occ7ko.jpg'},
            {code: '555088-161', name: 'Air Jordan 1 Retro High OG Heritage', price: '€90,00', size: '40', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871475/WhatsApp_Image_2026-04-18_at_19.18.32_o6ftyj.jpg'},
            {code: 'CD0461-001', name: 'Nike Air Max', price: '€100,00', size: '39', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871531/WhatsApp_Image_2026-04-22_at_10.42.59_o1yem1.jpg'},
            {code: 'H03472', name: 'Adidas Campus 00s', price: '€60,00', size: '39', url: 'https://res.cloudinary.com/duq0tf4da/image/upload/v1776871575/WhatsApp_Image_2026-04-18_at_19.19.56_e4hdnp.jpg'}
        ];

        function generateProducts() {
            const grid = document.getElementById('products-grid');
            products.forEach((prod, idx) => {
                const id = idx + 1;
                const html = `
                    <div class="card">
                        <div class="carousel" id="carousel-${id}">
                            <div class="track" id="track-${id}">
                                <div class="slide">
                                    <img src="${prod.url}" alt="${prod.name}">
                                    <div class="overlay">1/3</div>
                                </div>
                                <div class="slide">
                                    <img src="${prod.url}" alt="${prod.name}">
                                    <div class="overlay">2/3</div>
                                </div>
                                <div class="slide">
                                    <img src="${prod.url}" alt="${prod.name}">
                                    <div class="overlay">3/3</div>
                                </div>
                            </div>
                            <button class="prev">&lsaquo;</button>
                            <button class="next">&rsaquo;</button>
                            <div class="dots">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                        <div class="card-content">
                            <h3 class="name">${prod.code} - ${prod.name}</h3>
                            <p class="price">${prod.price}</p>
                            <p class="size">Size ${prod.size}</p>
                            <button class="buy">Buy Now</button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });

            // Initialize carousels after generation
            for (let i = 1; i <= products.length; i++) {
                initCarousel(i);
            }
        }

        function initCarousel(id) {
            const carousel = document.getElementById(`carousel-${id}`);
            const track = document.getElementById(`track-${id}`);
            const slides = track.querySelectorAll('.slide');
            const prev = carousel.querySelector('.prev');
            const next = carousel.querySelector('.next');
            const dotsCont = carousel.querySelector('.dots');
            const dots = dotsCont.querySelectorAll('.dot');
            let currentIndex = 0;
            const totalSlides = slides.length;

            function goToSlide(index) {
                track.style.transform = `translateX(-${index * 100}%)`;
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            }

            prev.addEventListener('click', () => {
                currentIndex = currentIndex === 0 ? totalSlides - 1 : currentIndex - 1;
                goToSlide(currentIndex);
            });

            next.addEventListener('click', () => {
                currentIndex = currentIndex === totalSlides - 1 ? 0 : currentIndex + 1;
                goToSlide(currentIndex);
            });

            dots.forEach((dot, index) => {
                dot.addEventListener('click', () => {
                    currentIndex = index;
                    goToSlide(currentIndex);
                });
            });

            goToSlide(0);
        }

        document.addEventListener('DOMContentLoaded', generateProducts);
    </script>
</body>
</html>
